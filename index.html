<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente HTTP Básico</title>
    <!-- Incluyendo Tailwind CSS para un diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Usando la fuente Inter de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos personalizados y sobreescrituras */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #111827; /* Gris oscuro para el fondo */
            color: #d1d5db; /* Color de texto claro */
        }
        /* Estilo para el resaltado de sintaxis en el JSON */
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .json-key { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        .json-boolean { color: #569cd6; }
        .json-null { color: #569cd6; }
        .json-brace { color: #ffd700; }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-6xl mx-auto bg-gray-900 rounded-xl shadow-2xl p-6 md:p-8">
        
        <!-- Cabecera de la Aplicación -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl md:text-4xl font-bold text-white">Cliente HTTP Básico</h1>
            <p class="text-gray-400 mt-2">Una herramienta simple para probar tus APIs.</p>
        </div>

        <!-- Sección de la Petición -->
        <div id="request-section" class="space-y-6">
            <!-- Fila de Método y URL -->
            <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4">
                <!-- Selector de Método -->
                <select id="method-select" class="w-full md:w-40 bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200">
                    <option>GET</option>
                    <option>POST</option>
                    <option>PUT</option>
                    <option>DELETE</option>
                    <option>PATCH</option>
                    <option>HEAD</option>
                </select>
                <!-- Input de URL -->
                <input type="text" id="url-input" placeholder="https://api.example.com/data" class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200" value="https://jsonplaceholder.typicode.com/todos/1">
            </div>
            
            <!-- Campo para Bearer Token -->
            <div id="auth-section">
                <label for="token-input" class="block text-sm font-medium text-gray-300 mb-2">Bearer Token (Opcional)</label>
                <input type="text" id="token-input" placeholder="Pega tu token de autorización aquí" class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200">
            </div>

            <!-- Cuerpo de la Petición (Request Body) -->
            <div id="body-section" class="hidden">
                <label for="body-textarea" class="block text-sm font-medium text-gray-300 mb-2">Cuerpo de la Petición (JSON)</label>
                <textarea id="body-textarea" rows="8" class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200" placeholder='{ "key": "value" }'></textarea>
            </div>

            <!-- Botón de Enviar -->
            <div class="text-center">
                <button id="send-btn" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-12 rounded-lg transition-transform transform hover:scale-105 duration-300 ease-in-out focus:outline-none focus:ring-4 focus:ring-blue-800">
                    Enviar Petición
                </button>
            </div>
        </div>

        <!-- Indicador de Carga -->
        <div id="loader" class="hidden flex justify-center my-8">
             <div class="loader"></div>
        </div>

        <!-- Sección de la Respuesta -->
        <div id="response-section" class="mt-10 hidden">
            <h2 class="text-2xl font-semibold text-white mb-4">Respuesta</h2>
            <!-- Pestañas para Estado, Cabeceras y Cuerpo -->
            <div class="flex border-b border-gray-700 mb-4">
                <button data-tab="status" class="tab-btn py-2 px-4 text-gray-300 font-medium border-b-2 border-blue-500">Estado</button>
                <button data-tab="headers" class="tab-btn py-2 px-4 text-gray-500 font-medium border-b-2 border-transparent">Cabeceras</button>
                <button data-tab="body" class="tab-btn py-2 px-4 text-gray-500 font-medium border-b-2 border-transparent">Cuerpo</button>
            </div>
            
            <div class="bg-gray-800 rounded-lg p-4 min-h-[200px]">
                <!-- Contenido del Estado -->
                <div id="status-content" class="tab-content">
                    <p class="text-lg">Estado: <span id="status-code" class="font-bold"></span></p>
                </div>
                <!-- Contenido de las Cabeceras -->
                <div id="headers-content" class="tab-content hidden">
                    <pre id="headers-pre" class="text-sm font-mono"></pre>
                </div>
                <!-- Contenido del Cuerpo -->
                <div id="body-content" class="tab-content hidden">
                    <pre id="body-pre" class="text-sm font-mono"></pre>
                </div>
                 <!-- Mensaje de Error -->
                <div id="error-content" class="tab-content hidden">
                    <p class="text-red-400"><strong>Error:</strong> <span id="error-message"></span></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SELECCIÓN DE ELEMENTOS DEL DOM ---
        const methodSelect = document.getElementById('method-select');
        const urlInput = document.getElementById('url-input');
        const tokenInput = document.getElementById('token-input'); // Nuevo elemento
        const bodySection = document.getElementById('body-section');
        const bodyTextarea = document.getElementById('body-textarea');
        const sendBtn = document.getElementById('send-btn');
        const loader = document.getElementById('loader');
        const responseSection = document.getElementById('response-section');
        const tabs = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        const statusCodeEl = document.getElementById('status-code');
        const headersPre = document.getElementById('headers-pre');
        const bodyPre = document.getElementById('body-pre');
        const errorContent = document.getElementById('error-content');
        const errorMessage = document.getElementById('error-message');

        // --- LÓGICA DE LA APLICACIÓN ---

        /**
         * Alterna la visibilidad del área de texto del cuerpo de la petición
         * según el método HTTP seleccionado.
         */
        methodSelect.addEventListener('change', () => {
            const method = methodSelect.value;
            if (['POST', 'PUT', 'PATCH'].includes(method)) {
                bodySection.classList.remove('hidden');
            } else {
                bodySection.classList.add('hidden');
            }
        });

        /**
         * Maneja el cambio de pestañas en la sección de respuesta.
         */
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // Estilos de las pestañas
                tabs.forEach(t => {
                    t.classList.remove('border-blue-500', 'text-gray-300');
                    t.classList.add('border-transparent', 'text-gray-500');
                });
                tab.classList.add('border-blue-500', 'text-gray-300');
                tab.classList.remove('border-transparent', 'text-gray-500');

                // Mostrar el contenido correspondiente
                const tabName = tab.getAttribute('data-tab');
                tabContents.forEach(content => {
                    content.classList.add('hidden');
                });
                document.getElementById(`${tabName}-content`).classList.remove('hidden');
            });
        });

        /**
         * Resalta la sintaxis de un string JSON.
         * @param {string} jsonString - El string JSON a formatear.
         * @returns {string} - El HTML con el JSON resaltado.
         */
        function syntaxHighlight(jsonString) {
            if (!jsonString) return '';
            // Previene errores con JSON malformado
            try {
                // Intenta parsear para verificar que sea un JSON válido y lo re-formatea
                const jsonObject = JSON.parse(jsonString);
                jsonString = JSON.stringify(jsonObject, null, 2);
            } catch (e) {
                // Si no es un JSON válido, devuelve el texto plano escapado
                return jsonString.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }
            
            return jsonString.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, (match) => {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return `<span class="${cls}">${match}</span>`;
            }).replace(/\{|\}|\[|\]/g, (match) => `<span class="json-brace">${match}</span>`);
        }
        
        /**
         * Envía la petición HTTP usando la API Fetch.
         */
        sendBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) {
                alert('Por favor, introduce una URL.');
                return;
            }

            // Muestra el loader y oculta la respuesta anterior
            loader.classList.remove('hidden');
            responseSection.classList.add('hidden');
            errorContent.classList.add('hidden');
            sendBtn.disabled = true;
            sendBtn.textContent = 'Enviando...';


            const method = methodSelect.value;
            // Configuración de cabeceras
            const headers = { 'Content-Type': 'application/json' };
            const token = tokenInput.value.trim();
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            const fetchOptions = {
                method: method,
                headers: headers
            };

            // Añade el cuerpo de la petición si es necesario
            if (['POST', 'PUT', 'PATCH'].includes(method)) {
                try {
                    // Validamos que el cuerpo sea un JSON válido antes de enviarlo
                    JSON.parse(bodyTextarea.value || '{}');
                    fetchOptions.body = bodyTextarea.value || '{}';
                } catch (e) {
                    showError('El cuerpo de la petición no es un JSON válido.');
                    return;
                }
            }
            
            try {
                const response = await fetch(url, fetchOptions);
                const responseData = await response.text(); // Leemos como texto primero

                // Muestra la sección de respuesta
                responseSection.classList.remove('hidden');

                // Muestra el estado
                statusCodeEl.textContent = `${response.status} ${response.statusText}`;
                if (response.ok) {
                    statusCodeEl.className = 'font-bold text-green-400';
                } else {
                    statusCodeEl.className = 'font-bold text-red-400';
                }
                
                // Muestra las cabeceras
                let headersString = '';
                response.headers.forEach((value, key) => {
                    headersString += `${key}: ${value}\n`;
                });
                headersPre.textContent = headersString;
                
                // Muestra el cuerpo, con resaltado si es JSON
                bodyPre.innerHTML = syntaxHighlight(responseData);

                // Asegúrate de que la pestaña de estado esté activa por defecto
                tabs[0].click();

            } catch (error) {
                showError(error.message);
            } finally {
                // Oculta el loader y restaura el botón
                loader.classList.add('hidden');
                sendBtn.disabled = false;
                sendBtn.textContent = 'Enviar Petición';
            }
        });
        
        /**
         * Muestra un mensaje de error en la UI.
         * @param {string} message - El mensaje de error a mostrar.
         */
        function showError(message) {
            responseSection.classList.remove('hidden');
            tabContents.forEach(c => c.classList.add('hidden'));
            errorContent.classList.remove('hidden');
            errorMessage.textContent = message;
            loader.classList.add('hidden');
            sendBtn.disabled = false;
            sendBtn.textContent = 'Enviar Petición';
        }
    </script>

</body>
</html>
